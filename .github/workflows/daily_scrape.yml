name: Daily Supermarket Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC daily
  workflow_dispatch: # Allows you to click "Run Workflow" manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # --- NEW: Matrix Strategy ---
    strategy:
      fail-fast: false # If Keells fails, Cargills will still finish (and vice versa)
      matrix:
        script: [keells.py, cargills.py] # Add as many scripts here as you want

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # --- UPDATED: Uses the matrix variable to run the script ---
      - name: Run Scraper (${{ matrix.script }})
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python ${{ matrix.script }}